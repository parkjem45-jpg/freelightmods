<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Firebase Auth Flow | Login + Signup + Hosting Check</title>
  <!-- Google Font & simple reset for clean UI -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Firebase SDKs (modular v9+ compat, but we use compat for simplicity & stability) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f0f5ff 0%, #e9eef5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* main glassmorphic card */
    .dashboard {
      max-width: 520px;
      width: 100%;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .header {
      background: #0a2b3e;
      padding: 1.5rem 2rem;
      color: white;
    }

    .header h1 {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 span {
      background: #ffb347;
      font-size: 1rem;
      padding: 2px 10px;
      border-radius: 40px;
      color: #1e2a32;
      font-weight: 600;
    }

    .header p {
      margin-top: 0.5rem;
      opacity: 0.8;
      font-size: 0.85rem;
    }

    .content {
      padding: 2rem;
    }

    /* user status badge */
    .status-card {
      background: #f8fafc;
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      margin-bottom: 1.8rem;
      border-left: 5px solid #3b82f6;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }

    .auth-state {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .user-badge {
      font-weight: 500;
      background: #e6f0ff;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.85rem;
      color: #075985;
    }

    .signout-btn {
      background: none;
      border: 1px solid #cbd5e1;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
      background: white;
    }

    .signout-btn:hover {
      background: #fee2e2;
      border-color: #f87171;
      color: #b91c1c;
    }

    .form-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.5rem;
    }

    .tab-btn {
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 30px;
      transition: all 0.2s;
      color: #475569;
      font-family: inherit;
    }

    .tab-btn.active {
      background: #0a2b3e;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .form-panel {
      display: none;
      animation: fade 0.2s ease;
    }

    .form-panel.active-panel {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(5px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    label {
      font-weight: 500;
      font-size: 0.8rem;
      color: #1e293b;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 1rem;
      border: 1px solid #cbd5e1;
      font-family: inherit;
      font-size: 0.9rem;
      transition: 0.2s;
      background: white;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .action-btn {
      width: 100%;
      background: #0f3b2c;
      background: linear-gradient(95deg, #0f3b2c, #1e6f5c);
      border: none;
      padding: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 2rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
      font-family: inherit;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .action-btn:hover {
      transform: scale(0.98);
      background: linear-gradient(95deg, #0a2e22, #185e4e);
    }

    .message-area {
      margin-top: 1.2rem;
      font-size: 0.8rem;
      padding: 10px 12px;
      border-radius: 1rem;
      background: #f1f5f9;
      color: #0c4a6e;
      word-break: break-word;
    }

    .error-message {
      background: #fff0f0;
      color: #b91c1c;
      border-left: 3px solid #ef4444;
    }

    .success-message {
      background: #e6f9ed;
      color: #166534;
      border-left: 3px solid #22c55e;
    }

    .hosting-section {
      margin-top: 2rem;
      border-top: 1px dashed #cbd5e6;
      padding-top: 1.2rem;
    }

    .hosting-check {
      background: #fefce8;
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hosting-check span:first-child {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .hosting-badge {
      background: #e2e3e8;
      padding: 4px 12px;
      border-radius: 40px;
      font-family: monospace;
      font-size: 0.75rem;
    }

    .online {
      background: #d1fae5;
      color: #065f46;
    }

    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1rem;
      color: #5b6e8c;
    }
  </style>
</head>
<body>

<div class="dashboard">
  <div class="header">
    <h1>🔥 Firebase Flow <span>Auth+Host</span></h1>
    <p>Sign up / Login test • Real-time user state • Hosting diagnostic</p>
  </div>
  <div class="content">
    <!-- user status & sign out -->
    <div class="status-card">
      <div class="auth-state">
        <div class="user-badge" id="userStatusText">🔍 Checking session...</div>
        <button id="signOutBtn" class="signout-btn" style="display: none;">🚪 Sign out</button>
      </div>
    </div>

    <!-- Auth Tabs (Login / Signup) -->
    <div class="form-tabs">
      <button class="tab-btn active" data-tab="login">🔐 Log In</button>
      <button class="tab-btn" data-tab="signup">📝 Create Account</button>
    </div>

    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="form-panel active-panel">
      <div class="input-group">
        <label>📧 Email address</label>
        <input type="email" id="loginEmail" placeholder="user@example.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>🔒 Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="loginBtn" class="action-btn">Login →</button>
    </div>

    <!-- SIGNUP PANEL -->
    <div id="signupPanel" class="form-panel">
      <div class="input-group">
        <label>📧 Email address</label>
        <input type="email" id="signupEmail" placeholder="user@example.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>🔒 Password (min 6 chars)</label>
        <input type="password" id="signupPassword" placeholder="create strong password" autocomplete="new-password">
      </div>
      <button id="signupBtn" class="action-btn">Sign up →</button>
    </div>

    <!-- dynamic message display -->
    <div id="globalMessage" class="message-area">✨ Ready — test signup/login with your Firebase project</div>

    <!-- HOSTING & WEBSITE PROPER HOSTING CHECK -->
    <div class="hosting-section">
      <div class="hosting-check">
        <span>🌐 Website & Firebase Hosting Status</span>
        <span id="hostingIndicator" class="hosting-badge">checking...</span>
      </div>
      <div id="hostingDetails" style="font-size:0.75rem; margin-top: 8px; color:#334155;"></div>
      <div class="footer-note">
        ✔ Live connection test: Firebase Auth + realtime configuration check.
      </div>
    </div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // FIREBASE CONFIGURATION (exactly as provided by user)
  // All credentials are from the user's snippet.
  // --------------------------------------------------------------
  const firebaseConfig = {
    apiKey: "AIzaSyC04-Bo_9r4BSqNzUOwZqwCFiOXQpXf8xI",
    authDomain: "modyes99.firebaseapp.com",
    databaseURL: "https://modyes99-default-rtdb.firebaseio.com",
    projectId: "modyes99",
    storageBucket: "modyes99.firebasestorage.app",
    messagingSenderId: "848401642956",
    appId: "1:848401642956:web:59e662df5976668f5d9969",
    measurementId: "G-EZS3CZ8FTC"
  };

  // Initialize Firebase (Compat version)
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const auth = firebase.auth();

  // DOM elements
  const userStatusSpan = document.getElementById('userStatusText');
  const signOutBtn = document.getElementById('signOutBtn');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const signupEmail = document.getElementById('signupEmail');
  const signupPassword = document.getElementById('signupPassword');
  const globalMessageDiv = document.getElementById('globalMessage');
  const hostingIndicatorSpan = document.getElementById('hostingIndicator');
  const hostingDetailsDiv = document.getElementById('hostingDetails');

  // Tab switching
  const tabBtns = document.querySelectorAll('.tab-btn');
  const loginPanel = document.getElementById('loginPanel');
  const signupPanel = document.getElementById('signupPanel');

  // Helper: set message (type: 'error', 'success', 'info')
  function setMessage(text, type = 'info') {
    globalMessageDiv.innerText = text;
    globalMessageDiv.classList.remove('error-message', 'success-message');
    if (type === 'error') {
      globalMessageDiv.classList.add('error-message');
    } else if (type === 'success') {
      globalMessageDiv.classList.add('success-message');
    } else {
      globalMessageDiv.classList.remove('error-message', 'success-message');
    }
    // auto clear after 5 sec if needed but not mandatory, better keeps last action visible
    // but we keep persistent
  }

  // Update UI based on auth state
  function updateAuthUI(user) {
    if (user) {
      const email = user.email || 'authenticated user';
      userStatusSpan.innerHTML = `✅ Logged in as <strong>${email}</strong>`;
      signOutBtn.style.display = 'inline-block';
      // When logged in, add subtle success note in message area optionally
      setMessage(`Welcome back! You are signed in as ${email}. Firebase auth works.`, 'success');
      // Optionally clear sensitive input fields?
    } else {
      userStatusSpan.innerHTML = `🔓 Not signed in — use Login or Signup`;
      signOutBtn.style.display = 'none';
      setMessage('No active session. Sign in or create a new account.', 'info');
    }
  }

  // Hosting Check: tests that the website is properly hosted + Firebase connectivity
  // We run two checks:
  // 1. Basic fetch to Firebase Auth (already working if onlin) but we also verify Firebase config works
  // 2. Show hosting environment: is it served over HTTPS/local? and ability to talk to Firebase services.
  // Also we perform a simple test: attempt to get auth config, measure latency.
  // Since the page is already loading Firebase, we confirm hosting + domain.
  async function performHostingDiagnostic() {
    try {
      // Check connectivity to Firebase by trying to get a dummy auth state (already initialized)
      // Also verify if Firebase services respond.
      // Additional: attempt to fetch a simple RTDB reference (optional but safe for readonly test)
      // But since we have authDomain and projectId, just show hosting info.
      const currentUrl = window.location.href;
      const protocol = window.location.protocol;
      const hostname = window.location.hostname;
      let hostingEnv = '';
      if (protocol === 'https:' || hostname === 'localhost' || hostname === '127.0.0.1') {
        hostingEnv = (protocol === 'https:') ? '🔒 Secure HTTPS (recommended)' : '🌐 Local / HTTP development';
      } else {
        hostingEnv = '⚠️ Not HTTPS — some Firebase features may be limited';
      }

      // Test if Firebase auth domain is reachable via simple ping using auth object
      let firebaseReachable = false;
      let latencyMs = '--';
      const start = performance.now();
      try {
        // We just fetch the auth config / check currentUser (does not throw heavy)
        await auth.getRedirectResult();  // non-blocking, but we use timeout?
        // Actually simpler: just do a check with a small timeout: try to sign in anonymously? No, we do just a presence test.
        // We'll just resolve based on auth app existence - but we need real connectivity.
        // We'll use a fetch to a known Firebase endpoint: firebase.auth().app.options.authDomain
        const authDomain = firebaseConfig.authDomain;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 4000);
        const testFetch = await fetch(`https://${authDomain}/__/auth/`, { method: 'HEAD', signal: controller.signal });
        clearTimeout(timeoutId);
        if (testFetch.ok || testFetch.status < 500) {
          firebaseReachable = true;
          const end = performance.now();
          latencyMs = Math.round(end - start);
        } else {
          firebaseReachable = false;
        }
      } catch (netErr) {
        firebaseReachable = false;
      }
      
      const reachableText = firebaseReachable ? '✅ Firebase services reachable' : '⚠️ Firebase endpoint unreachable (network/firewall?)';
      let badgeClass = 'hosting-badge';
      let badgeHtml = '';
      if (firebaseReachable && (protocol === 'https:' || hostname === 'localhost')) {
        badgeHtml = '🟢 Proper Hosting + Firebase OK';
        hostingIndicatorSpan.className = 'hosting-badge online';
      } else if (firebaseReachable) {
        badgeHtml = '🟡 Firebase reachable, but HTTP might limit auth';
        hostingIndicatorSpan.className = 'hosting-badge';
      } else {
        badgeHtml = '🔴 Hosting connectivity issue';
        hostingIndicatorSpan.className = 'hosting-badge';
      }
      hostingIndicatorSpan.innerText = badgeHtml;
      
      let detailsText = `📍 Host: ${hostname} | ${hostingEnv} <br> 🔥 ${reachableText} ${latencyMs !== '--' ? `(ping ${latencyMs}ms)` : ''}`;
      detailsText += `<br> ✨ Firebase SDK version: ${firebase.SDK_VERSION || '9.22.2'} | Project: ${firebaseConfig.projectId}`;
      hostingDetailsDiv.innerHTML = detailsText;

      // Second part: also verify that the page is served from the correct hosting perspective (check if it's custom domain or firebase hosting)
      if (hostname.includes('web.app') || hostname.includes('firebaseapp.com')) {
        hostingDetailsDiv.innerHTML += `<br> 🚀 Detected Firebase Hosting domain: perfect for deployment.`;
      } else if (hostname === 'localhost') {
        hostingDetailsDiv.innerHTML += `<br> 🖥️ Local development — for production, deploy to Firebase Hosting.`;
      } else {
        hostingDetailsDiv.innerHTML += `<br> 🌍 Custom domain — ensure Firebase Hosting configuration.`;
      }
    } catch (err) {
      hostingIndicatorSpan.innerText = '⚠️ diagnostic error';
      hostingDetailsDiv.innerHTML = `Failed to run full hosting check: ${err.message}`;
    }
  }

  // reset signup/login forms (optional)
  function clearInputs(panel = 'both') {
    if (panel === 'login' || panel === 'both') {
      loginEmail.value = '';
      loginPassword.value = '';
    }
    if (panel === 'signup' || panel === 'both') {
      signupEmail.value = '';
      signupPassword.value = '';
    }
  }

  // ---------- AUTH ACTIONS ----------
  // Login handler
  async function handleLogin() {
    const email = loginEmail.value.trim();
    const password = loginPassword.value;
    if (!email || !password) {
      setMessage('❌ Please enter both email and password.', 'error');
      return;
    }
    setMessage('Signing in ...', 'info');
    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      setMessage(`✅ Success: Logged in as ${userCredential.user.email}`, 'success');
      clearInputs('login');
    } catch (error) {
      console.error('login error', error);
      let friendlyMsg = '';
      switch (error.code) {
        case 'auth/user-not-found':
          friendlyMsg = 'No user found with this email. Please sign up first.';
          break;
        case 'auth/wrong-password':
          friendlyMsg = 'Incorrect password. Try again or reset password.';
          break;
        case 'auth/invalid-email':
          friendlyMsg = 'Invalid email format.';
          break;
        default:
          friendlyMsg = error.message;
      }
      setMessage(`❌ Login failed: ${friendlyMsg}`, 'error');
    }
  }

  // Signup handler
  async function handleSignup() {
    const email = signupEmail.value.trim();
    const password = signupPassword.value;
    if (!email || !password) {
      setMessage('❌ Email and password required.', 'error');
      return;
    }
    if (password.length < 6) {
      setMessage('⚠️ Password must be at least 6 characters.', 'error');
      return;
    }
    setMessage('Creating account ...', 'info');
    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      setMessage(`🎉 Account created and signed in as ${userCredential.user.email}!`, 'success');
      clearInputs('signup');
    } catch (error) {
      console.error('signup error', error);
      let friendlyErr = '';
      if (error.code === 'auth/email-already-in-use') {
        friendlyErr = 'Email already in use. Try logging in.';
      } else if (error.code === 'auth/weak-password') {
        friendlyErr = 'Weak password. Use at least 6 characters.';
      } else if (error.code === 'auth/invalid-email') {
        friendlyErr = 'Invalid email address.';
      } else {
        friendlyErr = error.message;
      }
      setMessage(`❌ Signup error: ${friendlyErr}`, 'error');
    }
  }

  // Sign out
  async function handleSignOut() {
    try {
      await auth.signOut();
      setMessage('🚪 Signed out successfully.', 'success');
    } catch (err) {
      setMessage(`Sign out error: ${err.message}`, 'error');
    }
  }

  // Listen to auth state changes (persistent)
  auth.onAuthStateChanged((user) => {
    updateAuthUI(user);
    // After UI updates, refresh hosting check again? but keep it one time plus each time login
    performHostingDiagnostic(); // Re-run diagnostic after auth change (to show user context)
  });

  // Tab switching logic
  function switchTab(tabId) {
    if (tabId === 'login') {
      loginPanel.classList.add('active-panel');
      signupPanel.classList.remove('active-panel');
      document.querySelector('[data-tab="login"]').classList.add('active');
      document.querySelector('[data-tab="signup"]').classList.remove('active');
    } else {
      signupPanel.classList.add('active-panel');
      loginPanel.classList.remove('active-panel');
      document.querySelector('[data-tab="signup"]').classList.add('active');
      document.querySelector('[data-tab="login"]').classList.remove('active');
    }
    setMessage(`Switched to ${tabId === 'login' ? 'Login' : 'Signup'} mode`, 'info');
  }

  tabBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const tabVal = btn.getAttribute('data-tab');
      if (tabVal === 'login') switchTab('login');
      else switchTab('signup');
    });
  });

  loginBtn.addEventListener('click', handleLogin);
  signupBtn.addEventListener('click', handleSignup);
  signOutBtn.addEventListener('click', handleSignOut);

  // Additional: allow pressing enter on inputs (simple)
  const inputs = [loginEmail, loginPassword, signupEmail, signupPassword];
  inputs.forEach(inp => {
    inp.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const activePanel = document.querySelector('.form-panel.active-panel');
        if (activePanel.id === 'loginPanel') handleLogin();
        else if (activePanel.id === 'signupPanel') handleSignup();
      }
    });
  });

  // initial diagnostic on load (hosting & firebase check)
  window.addEventListener('load', () => {
    // Fire hosting check after auth initial load
    performHostingDiagnostic();
    // verify if any existing user is logged in via persistence
    setMessage('Firebase ready. Use valid credentials or sign up.', 'info');
  });
</script>
</body>
</html>
