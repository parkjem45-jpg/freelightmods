<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Freelightmods — Premium modded APKs and games">
    <title>Freelightmods • Premium Modded APKs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0b0e14;
            --bg-secondary: #131823;
            --bg-card: #1a2330;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-cyan: #00f2fe;
            --accent-purple: #4facfe;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow-card: 0 20px 30px -10px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container { width: 92%; max-width: 1280px; margin: 0 auto; padding: 0 16px; }

        /* ===== Header ===== */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(11, 14, 20, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 0;
        }
        .nav-container { display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
        .logo i { color: var(--accent-cyan); }
        .logo-text span {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        /* ===== Hero ===== */
        .hero { position: relative; padding: 80px 0 60px; overflow: hidden; }
        .hero-glow {
            position: absolute; top: -30%; right: -15%; width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, transparent 70%);
            border-radius: 50%; z-index: -1; pointer-events: none;
            animation: pulseGlow 4s infinite alternate;
        }
        @keyframes pulseGlow { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 0.8; transform: scale(1.1); } }

        .hero-content { max-width: 850px; text-align: center; margin: 0 auto; }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; font-weight: 600;
            color: var(--accent-cyan); margin-bottom: 24px;
        }
        .hero-title { font-size: clamp(2.5rem, 7vw, 4.5rem); font-weight: 700; margin-bottom: 16px; }
        .animated-gradient-text {
            background: linear-gradient(-45deg, #00f2fe, #4facfe, #f093fb, #f5576c, #00f2fe);
            background-size: 300% 300%; -webkit-background-clip: text; background-clip: text;
            color: transparent; animation: gradientShift 6s ease infinite; display: inline-block;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .hero-description { font-size: 1.15rem; color: var(--text-secondary); max-width: 650px; margin: 0 auto 32px; line-height: 1.7; }

        /* ===== App Grid ===== */
        .featured-section { padding: 40px 0 80px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .section-header h2 { font-size: clamp(2rem, 5vw, 2.8rem); margin-bottom: 4px; }
        .section-subtitle { color: var(--text-secondary); font-size: 1rem; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px; }
        .app-card {
            background: var(--bg-card); border-radius: 24px; padding: 24px 20px;
            border: 1px solid var(--border-color); transition: var(--transition);
            box-shadow: var(--shadow-card); display: flex; flex-direction: column;
            position: relative; overflow: hidden; cursor: pointer;
        }
        .app-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            opacity: 0; transition: var(--transition);
        }
        .app-card:hover { transform: translateY(-8px); border-color: rgba(79, 172, 254, 0.3); }
        .app-card:hover::before { opacity: 1; }

        .app-icon {
            width: 72px; height: 72px; background: linear-gradient(145deg, #1e2a3a, #141c28);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; font-size: 2rem; color: var(--accent-cyan);
            transition: var(--transition); overflow: hidden; flex-shrink: 0;
            pointer-events: none; user-select: none;
        }
        .app-card:hover .app-icon { transform: scale(1.05); }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; pointer-events: none; }
        .app-icon i { pointer-events: none; }

        .app-info h3 { font-size: 1.25rem; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-meta { display: flex; gap: 16px; color: var(--text-secondary); font-size: 0.85rem; margin: 8px 0; flex-wrap: wrap; }
        .app-meta i { margin-right: 4px; color: var(--accent-purple); }
        .app-meta .mod-tag i { color: #fbbf24; }

        .download-tag {
            margin-top: auto; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
            padding: 12px; border-radius: 14px; font-weight: 600; text-align: center;
            transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
            color: var(--text-primary); margin-top: 16px; font-size: 0.95rem;
        }
        .download-tag i { color: var(--accent-cyan); transition: var(--transition); }
        .app-card:hover .download-tag { background: var(--accent-cyan); color: #0b0e14; border-color: var(--accent-cyan); }
        .app-card:hover .download-tag i { color: #0b0e14; }

        /* ===== Footer ===== */
        .footer { background: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: 48px 0; text-align: center; color: var(--text-secondary); font-size: 0.9rem; }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .hero { padding: 60px 0; }
            .app-grid { grid-template-columns: 1fr; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container nav-container">
            <a href="#" class="logo">
                <i class="fas fa-bolt"></i>
                <span class="logo-text">Free Lite <span class="logo-highlight">Mods</span></span>
            </a>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-glow"></div>
        <div class="container hero-content">
            <div class="hero-badge"><i class="fas fa-check-circle"></i> Verified & Safe</div>
            <h1 class="hero-title">
                Premium Mods,<br>
                <span class="animated-gradient-text">Zero Compromise</span>
            </h1>
            <p class="hero-description">
                Discover a curated collection of modded APKs and games.
                Fast downloads, no bloatware, just pure performance.
            </p>
        </div>
    </section>

    <!-- Apps Grid -->
    <section class="featured-section">
        <div class="container">
            <div class="section-header">
                <div>
                    <h2>Trending Mods</h2>
                    <p class="section-subtitle">Click any app to download</p>
                </div>
            </div>
            <div class="app-grid" id="appGrid">
                <!-- Apps injected by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Freelightmods. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="apps-data.js"></script>
    <script>
    (function() {
        'use strict';

        function renderApps() {
            const grid = document.getElementById('appGrid');
            if (!grid) return;
            grid.innerHTML = '';

            if (!appsData || appsData.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary);grid-column:1/-1;"><i class="fas fa-box-open" style="font-size:40px;margin-bottom:16px;display:block;"></i>No apps available</div>';
                return;
            }

            const fragment = document.createDocumentFragment();

            appsData.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.setAttribute('data-id', app.id);

                // Icon
                let iconHtml = '';
                if (app.image && app.image.trim()) {
                    iconHtml = '<img src="' + escapeHtml(app.image) + '" alt="' + escapeHtml(app.name) + '" loading="lazy">';
                } else {
                    iconHtml = '<i class="' + escapeHtml(app.icon || 'fas fa-mobile-alt') + '"></i>';
                }

                const modBadge = app.mod ? '<span class="mod-tag"><i class="fas fa-crown"></i> ' + escapeHtml(app.mod) + '</span>' : '';
                const downloadCount = app.downloads ? '<span><i class="fas fa-download"></i> ' + formatNum(app.downloads) + '</span>' : '';

                card.innerHTML = `
                    <div class="app-icon">${iconHtml}</div>
                    <div class="app-info">
                        <h3>${escapeHtml(app.name)}</h3>
                        <div class="app-meta">
                            <span><i class="fas fa-code-branch"></i> ${escapeHtml(app.version || 'v1.0')}</span>
                            <span><i class="fas fa-weight-hanging"></i> ${escapeHtml(app.size || 'N/A')}</span>
                        </div>
                        <div class="app-meta" style="margin-top:4px">${modBadge}</div>
                        <div class="app-meta">${downloadCount}</div>
                    </div>
                    <div class="download-tag"><i class="fas fa-download"></i> Click to Download</div>
                `;

                // Click handler — opens download page in NEW TAB
                card.addEventListener('click', () => {
                    const url = 'download.html?app=' + encodeURIComponent(app.id);
                    window.open(url, '_blank');
                });

                fragment.appendChild(card);
            });

            grid.appendChild(fragment);

            // Attach image error handlers
            grid.querySelectorAll('.app-icon img').forEach(img => {
                img.addEventListener('error', function() {
                    this.style.display = 'none';
                    this.parentElement.innerHTML = '<i class="fas fa-mobile-alt"></i>';
                });
            });
        }

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatNum(n) {
            if (!n) return '0';
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        }

        // Render on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderApps);
        } else {
            renderApps();
        }
    })();
    </script>
</body>
</html>
