<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download YouTube Premium • Freelightmods</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0b0e14;
            --bg-secondary: #131823;
            --bg-card: #1a2330;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-cyan: #00f2fe;
            --accent-purple: #4facfe;
            --accent-danger: #f5576c;
            --accent-success: #10b981;
            --border-color: rgba(255, 255, 255, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background glow */
        body::before {
            content: '';
            position: fixed;
            top: -25%;
            right: -15%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.9; transform: scale(1.15); }
        }

        .page-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Site Name */
        .site-header {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }
        .site-header i { color: var(--accent-cyan); font-size: 1.6rem; }

        /* App Card */
        .app-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px 28px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            opacity: 0.8;
        }

        .app-icon-large {
            width: 100px; height: 100px;
            border-radius: 24px;
            background: linear-gradient(145deg, #1e2a3a, #141c28);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: #ff0000;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .app-icon-large:hover { transform: scale(1.05); }

        .app-name { font-size: 1.9rem; font-weight: 700; line-height: 1.2; }

        .app-meta {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
        }
        .meta-chip {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 6px;
            font-weight: 500;
        }
        .meta-chip i { font-size: 0.75rem; color: var(--accent-purple); }
        .meta-chip.mod-chip i { color: #fbbf24; }

        /* Note Box */
        .note-box {
            background: rgba(0, 242, 254, 0.06);
            border: 1px solid rgba(0, 242, 254, 0.15);
            color: var(--accent-cyan);
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            text-align: center;
            transition: all 0.3s ease;
        }
        .note-box i { font-size: 1.1rem; }
        .note-box.ready {
            background: rgba(16, 185, 129, 0.06);
            border-color: rgba(16, 185, 129, 0.2);
            color: var(--accent-success);
        }

        /* ===== RGB PROGRESS BAR ===== */
        .progress-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .rgb-border {
            position: relative;
            width: 100%;
            padding: 4px;
            border-radius: 16px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400% 400%;
            animation: rgbRotate 2s linear infinite;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
        .rgb-border::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 18px;
            background: inherit;
            filter: blur(12px);
            opacity: 0.6;
            z-index: -1;
            animation: rgbRotate 2s linear infinite;
        }

        @keyframes rgbRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .progress-inner {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 6px;
        }
        .progress-track {
            height: 22px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 8px;
            transition: width 3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            animation: shimmer 0.8s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== DOWNLOAD BUTTON ===== */
        .download-area {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .download-area.visible {
            display: flex;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .download-btn-glow {
            width: 100%;
            padding: 18px 32px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #0b0e14;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.3);
            position: relative;
            overflow: hidden;
        }
        .download-btn-glow:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 242, 254, 0.5);
        }
        .download-btn-glow:active { transform: translateY(-1px); }
        .download-btn-glow i { font-size: 1.3rem; }

        .file-details {
            color: var(--text-secondary);
            font-size: 0.85rem;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .file-details i { color: var(--accent-purple); font-size: 0.8rem; }

        /* Back Link */
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            margin-top: 8px;
            font-weight: 500;
        }
        .back-link:hover { color: var(--accent-cyan); gap: 12px; }

        /* Responsive */
        @media (max-width: 480px) {
            .app-name { font-size: 1.5rem; }
            .app-icon-large { width: 80px; height: 80px; font-size: 2.5rem; }
            .app-card { padding: 28px 20px; }
            .site-header { font-size: 1.3rem; }
            .download-btn-glow { font-size: 1rem; padding: 16px 24px; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- Site Name -->
        <div class="site-header">
            <i class="fas fa-bolt"></i>
            Freelightmods
        </div>

        <!-- App Info Card -->
        <div class="app-card">
            <div class="app-icon-large">
                <i class="fab fa-youtube"></i>
            </div>
            <h1 class="app-name">YouTube Premium</h1>
            <div class="app-meta">
                <span class="meta-chip"><i class="fas fa-code-branch"></i> v18.45.41</span>
                <span class="meta-chip"><i class="fas fa-weight-hanging"></i> 134 MB</span>
                <span class="meta-chip mod-chip"><i class="fas fa-crown"></i> No Ads</span>
            </div>
        </div>

        <!-- Note -->
        <div class="note-box" id="noteBox">
            <i class="fas fa-clock"></i>
            Wait 3 seconds for download — do not refresh the page
        </div>

        <!-- RGB Progress Bar -->
        <div class="progress-area" id="progressArea">
            <div class="rgb-border">
                <div class="progress-inner">
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Download Button Area -->
        <div class="download-area" id="downloadArea">
            <button class="download-btn-glow" id="downloadBtn">
                <i class="fas fa-download"></i>
                <span>Download Now</span>
            </button>
            <div class="file-details">
                <span><i class="fas fa-weight-hanging"></i> 134 MB</span>
                <span style="color:var(--border-color)">|</span>
                <span><i class="fas fa-code-branch"></i> v18.45.41</span>
            </div>
        </div>

        <!-- Back Link -->
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to all mods
        </a>
    </div>

    <script>
    (function() {
        'use strict';

        /* ===== EDIT THIS: Your actual APK download link ===== */
        const APK_DOWNLOAD_LINK = 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf';
        /* ==================================================== */
        /*
         * Replace the link above with your real YouTube Premium APK URL.
         * Example: 'https://cdn.example.com/youtube-premium-v18.45.41.apk'
         * For testing, any direct file link works (PDF, ZIP, MP4, etc.).
         */

        const els = {
            progressFill: document.getElementById('progressFill'),
            progressArea: document.getElementById('progressArea'),
            downloadArea: document.getElementById('downloadArea'),
            downloadBtn: document.getElementById('downloadBtn'),
            noteBox: document.getElementById('noteBox')
        };

        /* ==========================================
           3-SECOND LOADING ANIMATION
           ========================================== */
        function startLoading() {
            const fill = els.progressFill;

            // Force reflow so transition plays
            fill.offsetHeight;

            requestAnimationFrame(() => {
                fill.style.width = '100%';
            });

            // After exactly 3 seconds: hide progress, show button
            setTimeout(() => {
                els.progressArea.style.display = 'none';
                els.downloadArea.classList.add('visible');

                // Update note to ready state
                els.noteBox.classList.add('ready');
                els.noteBox.innerHTML = '<i class="fas fa-check-circle"></i> Ready to download!';
            }, 3000);
        }

        /* ==========================================
           DOWNLOAD BUTTON CLICK
           ========================================== */
        els.downloadBtn.addEventListener('click', function() {
            // Create a hidden anchor to force download
            const a = document.createElement('a');
            a.href = APK_DOWNLOAD_LINK;
            a.download = 'YouTube_Premium_v18.45.41.apk'; // Suggested filename
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();

            // Cleanup
            setTimeout(() => {
                if (a.parentElement) document.body.removeChild(a);
            }, 200);

            // Button feedback
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Starting download...';
            this.style.opacity = '0.8';
            this.style.cursor = 'wait';

            setTimeout(() => {
                this.innerHTML = '<i class="fas fa-check"></i> Download Started';
                this.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                this.style.cursor = 'pointer';
                this.style.opacity = '1';
            }, 1500);
        });

        /* ==========================================
           BOOT — Start loading immediately
           ========================================== */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startLoading);
        } else {
            startLoading();
        }
    })();
    </script>
</body>
</html>
