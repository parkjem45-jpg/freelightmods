<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download APK from Free Lite Mods">
    <title>Download • Free Lite Mods</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .download-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 20px 40px; }
        .download-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 48px 36px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-card);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .app-icon-large {
            width: 100px; height: 100px;
            background: linear-gradient(145deg, #1e2a3a, #141c28);
            border-radius: 28px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 2.8rem;
            color: var(--accent-cyan);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .app-icon-large img { width: 100%; height: 100%; object-fit: cover; border-radius: 28px; }
        [data-theme="light"] .app-icon-large { background: linear-gradient(145deg, #e2e8f0, #cbd5e1); }
        
        .download-card h1 { font-size: 1.6rem; margin-bottom: 12px; word-break: break-word; }
        .download-meta {
            display: flex; justify-content: center; gap: 20px;
            color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 8px; flex-wrap: wrap;
        }
        .download-meta i { color: var(--accent-purple); margin-right: 4px; }
        .download-mod {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2);
            color: #fbbf24; padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600; margin-bottom: 28px;
        }
        
        .download-action { margin-bottom: 24px; }
        .download-btn-large {
            position: relative;
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 16px 40px; border-radius: 16px; font-size: 1.1rem; font-weight: 700;
            background: var(--bg-card); color: var(--text-primary);
            cursor: pointer; border: 3px solid transparent;
            transition: all 0.3s ease; width: 100%; max-width: 320px;
            animation: rgbBorder 2s linear infinite;
        }
        .download-btn-large:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.2);
        }
        .download-btn-large:disabled {
            opacity: 0.8; cursor: wait; filter: grayscale(0.3);
        }
        
        @keyframes rgbBorder {
            0% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
            25% { border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
            50% { border-color: #0000ff; box-shadow: 0 0 15px rgba(0,0,255,0.4); }
            75% { border-color: #ff00ff; box-shadow: 0 0 15px rgba(255,0,255,0.4); }
            100% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
        }
        
        .health-bar-container {
            width: 100%; max-width: 320px; height: 8px;
            background: var(--bg-primary); border-radius: 4px;
            overflow: hidden; margin: 16px auto 12px;
            border: 1px solid var(--border-color);
        }
        .health-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 4px;
        }
        @keyframes fillHealthBar { from { width: 0%; } to { width: 100%; } }
        
        .download-hint { color: var(--text-secondary); font-size: 0.9rem; min-height: 22px; }
        .download-hint.ready { color: var(--accent-success); font-weight: 600; }
        
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-secondary); font-size: 0.9rem;
            transition: var(--transition); margin-top: 8px;
        }
        .back-link:hover { color: var(--accent-cyan); gap: 12px; }
        
        .error-box { padding: 40px 20px; text-align: center; }
        .error-box h2 { margin-bottom: 12px; color: var(--accent-danger); }
        .error-box p { color: var(--text-secondary); margin-bottom: 24px; }
    </style>
</head>
<body>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <!-- Header -->
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-bolt"></i>
                <span class="logo-text">Free Lite <span class="logo-highlight">Mods</span></span>
            </a>
            <a href="index.html" class="btn btn-outline" style="padding:10px 20px;font-size:0.85rem">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </header>

    <main class="download-page">
        <div class="container" style="display:flex;justify-content:center">
            <div class="download-card" id="downloadCard">
                <div class="app-icon-large" id="appIconLarge">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h1 id="appName">Loading...</h1>
                <div class="download-meta" id="appMeta"></div>
                <div class="download-mod" id="appMod" style="display:none"></div>

                <div class="download-action">
                    <button class="download-btn-large" id="downloadBtn" disabled>
                        <i class="fas fa-download"></i>
                        <span id="btnText">Starting in 3s...</span>
                    </button>
                    <div class="health-bar-container">
                        <div class="health-bar" id="healthBar"></div>
                    </div>
                    <p class="download-hint" id="countdownText">Preparing your secure download...</p>
                </div>

                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
    <script src="firebase.js"></script>
    <script>
        /* ===== THEME TOGGLE ===== */
        (function() {
            const toggle = document.getElementById('themeToggle');
            if (!toggle) return;
            const html = document.documentElement;
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
            toggle.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            toggle.addEventListener('click', () => {
                const isDark = html.getAttribute('data-theme') === 'dark';
                const newTheme = isDark ? 'light' : 'dark';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                toggle.innerHTML = newTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        })();

        /* ===== PARSE APP DATA FROM URL ===== */
        const params = new URLSearchParams(window.location.search);
        const appData = {
            id: params.get('id') || '',
            name: params.get('name') || 'Unknown App',
            version: params.get('version') || '',
            size: params.get('size') || '',
            mod: params.get('mod') || '',
            icon: params.get('icon') || 'fas fa-mobile-alt',
            image: params.get('image') || '',
            link: params.get('link') || ''
        };

        /* ===== VALIDATE LINK ===== */
        if (!appData.link || appData.link === '#' || !appData.link.startsWith('http')) {
            document.querySelector('.download-page .container').innerHTML = `
                <div class="download-card error-box">
                    <i class="fas fa-exclamation-circle" style="font-size:3rem;color:var(--accent-danger);margin-bottom:16px"></i>
                    <h2>Download Link Missing</h2>
                    <p>The download link for this app has not been configured yet.<br>Please add it in the Admin Panel.</p>
                    <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
                </div>
            `;
            throw new Error('No valid download link');
        }

        /* ===== RENDER APP INFO ===== */
        document.getElementById('appName').textContent = appData.name;
        document.getElementById('appMeta').innerHTML = `
            <span><i class="fas fa-code-branch"></i> ${appData.version}</span>
            <span><i class="fas fa-weight-hanging"></i> ${appData.size}</span>
        `;
        if (appData.mod) {
            const modEl = document.getElementById('appMod');
            modEl.style.display = 'inline-flex';
            modEl.innerHTML = `<i class="fas fa-crown"></i> ${appData.mod}`;
        }

        /* ===== RENDER ICON ===== */
        const iconDiv = document.getElementById('appIconLarge');
        if (appData.image && appData.image.trim() && appData.image !== 'null') {
            const img = document.createElement('img');
            img.src = appData.image;
            img.alt = appData.name;
            img.addEventListener('error', function handleError() {
                this.removeEventListener('error', handleError);
                this.remove();
                iconDiv.innerHTML = `<i class="${appData.icon}"></i>`;
            });
            iconDiv.innerHTML = '';
            iconDiv.appendChild(img);
        } else {
            iconDiv.innerHTML = `<i class="${appData.icon}"></i>`;
        }

        /* ===== 3-SECOND COUNTDOWN + HEALTH BAR ===== */
        let seconds = 3;
        const btn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');
        const healthBar = document.getElementById('healthBar');
        const countdownText = document.getElementById('countdownText');

        // Start health bar animation (fills 0% → 100% over 3s)
        healthBar.style.animation = 'fillHealthBar 3s linear forwards';

        const timer = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                btnText.textContent = `Starting in ${seconds}s...`;
            } else {
                clearInterval(timer);
                btnText.textContent = 'Download Now';
                btn.disabled = false;
                countdownText.textContent = 'Your download is starting automatically...';
                countdownText.classList.add('ready');
                startDownload();
            }
        }, 1000);

        /* ===== START DOWNLOAD ===== */
        function startDownload() {
            // Increment download count in Firebase
            if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0 && appData.id) {
                const db = firebase.firestore();
                db.collection('apks').doc(appData.id).update({
                    downloads: firebase.firestore.FieldValue.increment(1)
                }).catch(() => {});
            }

            // Trigger download in new tab
            const a = document.createElement('a');
            a.href = appData.link;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                if (a.parentElement) document.body.removeChild(a);
            }, 100);
        }

        btn.addEventListener('click', startDownload);
    </script>
</body>
</html>
