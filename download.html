<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download APK from Free Lite Mods">
    <title>Download • Free Lite Mods</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .download-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 20px 40px; }
        .download-card {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 32px;
            padding: 48px 36px; max-width: 480px; width: 100%; text-align: center;
            box-shadow: var(--shadow-card); animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .app-icon-large {
            width: 100px; height: 100px; background: linear-gradient(145deg, #1e2a3a, #141c28);
            border-radius: 28px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 2.8rem; color: var(--accent-cyan);
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .app-icon-large img { width: 100%; height: 100%; object-fit: cover; border-radius: 28px; }
        [data-theme="light"] .app-icon-large { background: linear-gradient(145deg, #e2e8f0, #cbd5e1); }

        .download-card h1 { font-size: 1.6rem; margin-bottom: 12px; word-break: break-word; }
        .download-meta { display: flex; justify-content: center; gap: 20px; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 8px; flex-wrap: wrap; }
        .download-meta i { color: var(--accent-purple); margin-right: 4px; }
        .download-mod {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2);
            color: #fbbf24; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-bottom: 28px;
        }

        .download-action { margin-bottom: 24px; }
        .download-btn-large {
            position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 16px 40px; border-radius: 16px; font-size: 1.1rem; font-weight: 700;
            background: var(--bg-card); color: var(--text-primary); cursor: pointer; border: 3px solid transparent;
            transition: all 0.3s ease; width: 100%; max-width: 320px; animation: rgbBorder 2s linear infinite;
        }
        .download-btn-large:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 242, 254, 0.2); }
        .download-btn-large:disabled { opacity: 0.8; cursor: wait; filter: grayscale(0.3); }

        @keyframes rgbBorder {
            0% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
            25% { border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
            50% { border-color: #0000ff; box-shadow: 0 0 15px rgba(0,0,255,0.4); }
            75% { border-color: #ff00ff; box-shadow: 0 0 15px rgba(255,0,255,0.4); }
            100% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
        }

        .health-bar-container { width: 100%; max-width: 320px; height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; margin: 16px auto 12px; border: 1px solid var(--border-color); }
        .health-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); border-radius: 4px; transition: width 0.1s linear; }
        /* MODIFIED: countdown duration from 3s to 15s for smooth fill */
        .health-bar.animate { animation: fillHealthBar 15s linear forwards; }
        @keyframes fillHealthBar { from { width: 0%; } to { width: 100%; } }

        .download-hint { color: var(--text-secondary); font-size: 0.9rem; min-height: 22px; }
        .download-hint.ready { color: var(--accent-success); font-weight: 600; }
        .download-hint.error { color: var(--accent-danger); font-weight: 600; }

        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 0.9rem; transition: var(--transition); margin-top: 8px; }
        .back-link:hover { color: var(--accent-cyan); gap: 12px; }

        .error-box { padding: 40px 20px; text-align: center; }
        .error-box h2 { margin-bottom: 12px; color: var(--accent-danger); }
        .error-box p { color: var(--text-secondary); margin-bottom: 24px; }

        .loading-box { padding: 60px 20px; text-align: center; }
        .loading-box i { font-size: 2.5rem; color: var(--accent-cyan); margin-bottom: 16px; display: inline-block; animation: spin 1s linear infinite; }
        .loading-box p { color: var(--text-secondary); font-size: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .file-ext-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0, 242, 254, 0.1); border: 1px solid rgba(0, 242, 254, 0.2);
            color: var(--accent-cyan); padding: 4px 12px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 700; font-family: monospace;
            margin-bottom: 16px;
        }
    </style>
<base target="_blank">
<base target="_blank">
</head>
<body>

    <!-- 🔵 BLUE SCROLL BUTTON (ADDED AT TOP, NO EXISTING CONTENT CHANGED) -->
    <div style="display: flex; justify-content: center; margin: 20px 12px 0 12px; z-index: 30; position: relative;">
        <button id="slowScrollDownBtn" style="background: #1e88e5; border: none; border-radius: 60px; padding: 12px 28px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; font-family: inherit; letter-spacing: 0.3px; transition: 0.2s; box-shadow: 0 6px 14px rgba(30,136,229,0.3); display: inline-flex; align-items: center; gap: 10px;">
            <span>scroll down to download</span> <span style="font-size: 1.2rem;">↓</span>
        </button>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
        <i class="fas fa-sun"></i>
    </button>

    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-bolt"></i>
                <span class="logo-text">Free Lite <span class="logo-highlight">Mods</span></span>
            </a>
            <a href="index.html" class="btn btn-outline" style="padding:10px 20px;font-size:0.85rem">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </header>

    <main class="download-page">
        <div class="container" style="display:flex;justify-content:center;flex-direction:column;align-items:center;gap:20px;">

            <!-- Top Ad Banner (Smart Position) -->
            <div id="adDownloadTop" class="ad-container ad-download-top" style="display:none;width:100%;max-width:480px;"></div>

            <div class="download-card" id="downloadCard">
                <div class="loading-box" id="loadingState">
                    <i class="fas fa-spinner"></i>
                    <p>Loading app details...</p>
                </div>

                <div id="appContent" style="display:none;">
                    <div class="app-icon-large" id="appIconLarge">
                        <i class="fas fa-mobile-alt"></i>
                    </div>
                    <h1 id="appName">Loading...</h1>

                    <!-- File Extension Badge -->
                    <div class="file-ext-badge" id="fileExtBadge" style="display:none">
                        <i class="fas fa-file"></i> <span id="fileExtText">.apk</span>
                    </div>

                    <div class="download-meta" id="appMeta"></div>
                    <div class="download-mod" id="appMod" style="display:none"></div>

                    <div class="download-action">
                        <button class="download-btn-large" id="downloadBtn" disabled>
                            <i class="fas fa-download"></i>
                            <span id="btnText">Starting in 15s...</span>
                        </button>
                        <div class="health-bar-container">
                            <div class="health-bar" id="healthBar"></div>
                        </div>
                        <p class="download-hint" id="countdownText">Preparing your secure download...</p>
                    </div>
                </div>

                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>

            <!-- Middle Ad Banner (Smart Position) -->
            <div id="adDownloadMiddle" class="ad-container ad-download-middle" style="display:none;width:100%;max-width:480px;"></div>

            <!-- Bottom Ad Banner (Smart Position) -->
            <div id="adDownloadBottom" class="ad-container ad-download-bottom" style="display:none;width:100%;max-width:480px;"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase.js"></script>
    <script>
        /* ===== THEME TOGGLE ===== */
        (function() {
            const toggle = document.getElementById('themeToggle');
            if (!toggle) return;
            const html = document.documentElement;
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
            toggle.innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            toggle.addEventListener('click', () => {
                const isDark = html.getAttribute('data-theme') === 'dark';
                const newTheme = isDark ? 'light' : 'dark';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                toggle.innerHTML = newTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        })();

        /* ===== GET APP ID FROM URL ===== */
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id') || '';

        const loadingState = document.getElementById('loadingState');
        const appContent = document.getElementById('appContent');
        const appNameEl = document.getElementById('appName');
        const appMetaEl = document.getElementById('appMeta');
        const appModEl = document.getElementById('appMod');
        const appIconLarge = document.getElementById('appIconLarge');
        const downloadBtn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');
        const healthBar = document.getElementById('healthBar');
        const countdownText = document.getElementById('countdownText');
        const downloadCard = document.getElementById('downloadCard');
        const fileExtBadge = document.getElementById('fileExtBadge');
        const fileExtText = document.getElementById('fileExtText');

        let downloadLink = '';
        let countdownTimer = null;
        let currentAppData = null;

        function showError(title, message) {
            if (loadingState) loadingState.style.display = 'none';
            if (appContent) appContent.style.display = 'none';
            const existingError = downloadCard.querySelector('.error-box');
            if (existingError) existingError.remove();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-box';
            // FIXED: Single-line string concatenation
            errorDiv.innerHTML = '<i class="fas fa-exclamation-circle" style="font-size:3rem;color:var(--accent-danger);margin-bottom:16px;display:block"></i>' +
                '<h2>' + escapeHtml(title) + '</h2>' +
                '<p>' + escapeHtml(message) + '</p>' +
                '<a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>';
            downloadCard.insertBefore(errorDiv, downloadCard.querySelector('.back-link'));
        }

        async function loadAppData() {
            if (!appId) { showError('Invalid App ID', 'No app ID was provided in the URL.'); return; }
            if (typeof supabase === 'undefined') { showError('Connection Error', 'Supabase is not available. Please check your connection.'); return; }

            try {
                const { data, error } = await supabase.from('apks').select('*').eq('id', appId).single();
                if (error || !data) {
                    showError('App Not Found', 'This app does not exist in our database. It may have been removed.');
                    return;
                }
                currentAppData = data;
                downloadLink = data.link || '';

                if (!downloadLink || !downloadLink.startsWith('http')) {
                    showError('Download Link Missing', 'The download link for "' + escapeHtml(data.name || 'this app') + '" has not been configured yet. Please add it in the Admin Panel.');
                    return;
                }

                loadingState.style.display = 'none';
                appContent.style.display = 'block';
                renderAppInfo(currentAppData);
                startCountdown();
                await syncAdSettingsFromSupabase();
                renderDownloadAds();
            } catch (err) {
                console.error('[Download] Error:', err);
                showError('Failed to Load', 'Could not load app details from the server. Please try again later.');
            }
        }

        function renderAppInfo(app) {
            appNameEl.textContent = app.name || 'Unknown App';

            // Show file extension badge
            const ext = app.file_extension || 'apk';
            if (fileExtBadge && fileExtText) {
                fileExtText.textContent = '.' + ext;
                fileExtBadge.style.display = 'inline-flex';
            }

            // FIXED: Single-line string concatenation
            appMetaEl.innerHTML = '<span><i class="fas fa-code-branch"></i> ' + escapeHtml(app.version || 'N/A') + '</span>' +
                '<span><i class="fas fa-weight-hanging"></i> ' + escapeHtml(app.size || 'N/A') + '</span>' +
                '<span><i class="fas fa-download"></i> ' + formatNum(app.downloads || 0) + '</span>';
            if (app.mod) {
                appModEl.style.display = 'inline-flex';
                appModEl.innerHTML = '<i class="fas fa-crown"></i> ' + escapeHtml(app.mod);
            } else {
                appModEl.style.display = 'none';
            }
            if (app.image && app.image.trim() && app.image !== 'null') {
                const img = document.createElement('img');
                img.src = app.image; img.alt = app.name || 'App icon';
                img.addEventListener('error', function handleError() {
                    this.removeEventListener('error', handleError);
                    this.remove();
                    appIconLarge.innerHTML = '<i class="' + escapeHtml(app.icon || 'fas fa-mobile-alt') + '"></i>';
                });
                appIconLarge.innerHTML = '';
                appIconLarge.appendChild(img);
            } else {
                appIconLarge.innerHTML = '<i class="' + escapeHtml(app.icon || 'fas fa-mobile-alt') + '"></i>';
            }
        }

        // =========== UPDATED COUNTDOWN: 15 SECONDS ===========
        function startCountdown() {
            // Countdown extended to 15 seconds (was 3)
            let seconds = 15;
            // Remove any previous animation class and restart
            healthBar.classList.remove('animate');
            void healthBar.offsetWidth; // force reflow
            healthBar.classList.add('animate');
            btnText.textContent = 'Starting in ' + seconds + 's...';
            countdownText.textContent = `Please wait ${seconds} seconds, then click download`;
            countdownText.classList.remove('ready', 'error');
            
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                seconds--;
                if (seconds > 0) {
                    btnText.textContent = 'Starting in ' + seconds + 's...';
                    countdownText.textContent = `Preparing download — ${seconds} seconds remaining`;
                } else {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    // Enable manual download button (user must click)
                    btnText.textContent = 'Download Now';
                    downloadBtn.disabled = false;
                    countdownText.textContent = '✅ Ready to download. Click the button above to start.';
                    countdownText.classList.add('ready');
                    // Ensure health bar is fully filled at end (safety)
                    healthBar.style.width = '100%';
                }
            }, 1000);
        }

        // Manual download trigger (only when user clicks)
        async function triggerDownload() {
            if (!downloadLink || !currentAppData) {
                countdownText.textContent = 'Download link is not available';
                countdownText.classList.add('error');
                return;
            }
            try {
                // Increment download counter via RPC if available, fallback to update
                if (typeof supabase !== 'undefined' && supabase.rpc) {
                    try {
                        await supabase.rpc('increment_download', { apk_id: appId });
                    } catch (e) {
                        await supabase.from('apks').update({ downloads: (currentAppData.downloads || 0) + 1 }).eq('id', appId);
                    }
                } else if (typeof supabase !== 'undefined') {
                    await supabase.from('apks').update({ downloads: (currentAppData.downloads || 0) + 1 }).eq('id', appId);
                }
            } catch (err) {
                console.warn('Download count increment failed, but proceeding with download:', err);
            }
            // Create hidden link and trigger download
            const a = document.createElement('a');
            a.href = downloadLink;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { if (a.parentElement) document.body.removeChild(a); }, 2000);
        }

        // Event listener for manual download button
        downloadBtn.addEventListener('click', () => {
            if (!downloadLink) {
                countdownText.textContent = 'Download link is missing. Please contact support.';
                countdownText.classList.add('error');
                return;
            }
            if (downloadBtn.disabled) {
                countdownText.textContent = 'Please wait for the countdown to finish (15 seconds).';
                return;
            }
            triggerDownload();
        });

        /* ===== ADS SYSTEM ===== (Supabase Sync with DB fallback) */
        let _flmAdSettings = null;
        const AD_SETTINGS_PUBLIC_URL = 'https://egexyoqnzhaygvcbsdyi.supabase.co/storage/v1/object/public/termux-bucket/ad_settings.json';

        async function syncAdSettingsFromSupabase() {
            // 1. Try public storage bucket first (fast, no auth needed)
            try {
                const url = AD_SETTINGS_PUBLIC_URL + '?t=' + Date.now();
                const response = await fetch(url, { cache: 'no-store' });
                if (response.ok) {
                    const data = await response.json();
                    _flmAdSettings = data;
                    localStorage.setItem('flm_ad_settings', JSON.stringify(data));
                    console.log('[Ads] Settings synced from Supabase Storage');
                    return;
                }
                console.warn('[Ads] Storage returned status', response.status);
            } catch (e) {
                console.warn('[Ads] Storage fetch failed:', e);
            }

            // 2. Fallback to Supabase DB table
            try {
                if (typeof supabase !== 'undefined') {
                    const { data, error } = await supabase
                        .from('settings')
                        .select('data')
                        .eq('id', 'ads')
                        .maybeSingle();
                    if (!error && data && data.data) {
                        _flmAdSettings = data.data;
                        localStorage.setItem('flm_ad_settings', JSON.stringify(data.data));
                        console.log('[Ads] Settings synced from Supabase DB');
                        return;
                    }
                }
            } catch (e2) {
                console.warn('[Ads] DB fetch failed:', e2);
            }

            // 3. Final fallback to localStorage
            try {
                const stored = localStorage.getItem('flm_ad_settings');
                if (stored) {
                    _flmAdSettings = JSON.parse(stored);
                    console.log('[Ads] Using localStorage fallback');
                }
            } catch (e3) {
                console.error('[Ads] localStorage parse error:', e3);
            }
        }

        function getAdDefaults() {
            return {
                homeTop: { enabled: false, code: '', size: 'auto' },
                homeInline: { enabled: false, code: '', size: 'auto', position: 6 },
                homeBottom: { enabled: false, code: '', size: 'auto' },
                homeSticky: { enabled: false, code: '', size: 'auto' },
                downloadTop: { enabled: false, code: '', size: 'auto' },
                downloadMiddle: { enabled: false, code: '', size: 'auto' },
                downloadBottom: { enabled: false, code: '', size: 'auto' }
            };
        }

        function getAdSettings() {
            if (_flmAdSettings) return _flmAdSettings;
            try {
                const stored = localStorage.getItem('flm_ad_settings');
                const parsed = stored ? JSON.parse(stored) : {};
                const defaults = getAdDefaults();
                const merged = {};
                for (const key of Object.keys(defaults)) {
                    merged[key] = Object.assign({}, defaults[key], parsed[key] || {});
                }
                return merged;
            } catch (e) {
                console.error('[Ads] Settings parse error:', e);
                return getAdDefaults();
            }
        }

        function injectAdCode(container, html) {
            if (!container || !html) return;
            container.innerHTML = '';
            try {
                const range = document.createRange();
                const fragment = range.createContextualFragment(html);
                container.appendChild(fragment);
            } catch (e) {
                console.error('[Ads] Injection failed:', e);
                container.innerHTML = '<div style="color:var(--accent-danger);padding:12px;text-align:center;">Ad failed to load</div>';
            }
        }

        function renderDownloadAds() {
            const settings = getAdSettings();
            if (!settings) return;

            // Top ad
            if (settings.downloadTop && settings.downloadTop.enabled && settings.downloadTop.code) {
                const container = document.getElementById('adDownloadTop');
                if (container) {
                    container.style.display = 'flex';
                    container.className = 'ad-container ad-download-top ad-size-' + (settings.downloadTop.size || 'auto');
                    injectAdCode(container, settings.downloadTop.code);
                }
            } else {
                const container = document.getElementById('adDownloadTop');
                if (container) { container.style.display = 'none'; container.innerHTML = ''; }
            }

            // Middle ad
            if (settings.downloadMiddle && settings.downloadMiddle.enabled && settings.downloadMiddle.code) {
                const container = document.getElementById('adDownloadMiddle');
                if (container) {
                    container.style.display = 'flex';
                    container.className = 'ad-container ad-download-middle ad-size-' + (settings.downloadMiddle.size || 'auto');
                    injectAdCode(container, settings.downloadMiddle.code);
                }
            } else {
                const container = document.getElementById('adDownloadMiddle');
                if (container) { container.style.display = 'none'; container.innerHTML = ''; }
            }

            // Bottom ad 
            if (settings.downloadBottom && settings.downloadBottom.enabled && settings.downloadBottom.code) {
                const container = document.getElementById('adDownloadBottom');
                if (container) {
                    container.style.display = 'flex';
                    container.className = 'ad-container ad-download-bottom ad-size-' + (settings.downloadBottom.size || 'auto');
                    injectAdCode(container, settings.downloadBottom.code);
                }
            } else {
                const container = document.getElementById('adDownloadBottom');
                if (container) { container.style.display = 'none'; container.innerHTML = ''; }
            }
        }
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatNum(n) {
            if (!n) return '0';
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        }

        // ================ SCROLL BUTTON: SMOOTH SCROLL TO DOWNLOAD CARD ================
        (function initScrollButton() {
            const scrollBtn = document.getElementById('slowScrollDownBtn');
            if (scrollBtn) {
                scrollBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetElement = document.getElementById('downloadCard');
                    if (targetElement) {
                        targetElement.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start',
                            inline: 'nearest'
                        });
                    } else {
                        // fallback: scroll to main download container
                        const fallback = document.querySelector('.download-page');
                        if (fallback) {
                            fallback.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }
                });
            }
        })();

        loadAppData();
    </script>
</body>
</html>
